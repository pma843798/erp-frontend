    <script>
  // Suppress React DOM warnings for PrimeReact boolean attrs
  const originalWarn = console.warn;
  console.warn = function(...args) {
    if (args[0]?.includes?.('non-boolean attribute')) return;
    originalWarn.apply(console, args);
  };
</script>
